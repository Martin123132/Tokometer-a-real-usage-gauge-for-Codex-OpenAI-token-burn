name: Package

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  windows:
    name: Windows desktop artifacts
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: |
          npm run lint
          npm test
          npm run smoke

      - name: Build installer and portable app
        run: npm run dist

      - name: Create checksums
        shell: pwsh
        run: |
          Get-ChildItem -Path release -File | ForEach-Object {
            $hash = Get-FileHash -Algorithm SHA256 -Path $_.FullName
            "$($hash.Hash)  $($_.Name)" | Out-File -FilePath "release/$($_.Name).sha256" -Encoding utf8
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tokometer-windows
          retention-days: 30
          path: |
            release/*

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
